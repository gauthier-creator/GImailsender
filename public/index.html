<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMailSender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div>
        <h1>GMailSender</h1>
        <p class="subtitle">Envoi rapide d'emails post cold-call</p>
      </div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:4px;">
        <span id="userEmail" style="color:#666;font-size:13px;"></span>
        <a href="/stats.html" style="color:#4a9eff;text-decoration:none;font-size:13px;">Stats</a>
        <a href="/config.html" style="color:#4a9eff;text-decoration:none;font-size:13px;">Config</a>
        <a id="adminLink" href="/admin.html" style="color:#818cf8;text-decoration:none;font-size:13px;display:none;">Admin</a>
        <button onclick="logout()" style="background:none;border:1px solid #333;color:#999;width:auto;padding:4px 10px;font-size:12px;border-radius:6px;cursor:pointer;">Déco</button>
      </div>
    </div>

    <form id="emailForm">
      <div class="field">
        <label for="template">Template</label>
        <select id="template" required>
          <option value="">Choisir un template...</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="prenom">Prénom du contact</label>
          <input type="text" id="prenom" placeholder="Jean-Pierre" required>
        </div>
        <div class="field">
          <label for="email">Email du contact</label>
          <input type="email" id="email" placeholder="contact@exemple.com" required>
        </div>
      </div>

      <div id="dateRdvField" class="field" style="display:none;">
        <label for="dateRdv">Date et heure du RDV</label>
        <input type="text" id="dateRdv" placeholder="mercredi 08/04 à 15h45">
      </div>

      <div id="attachmentInfo" class="attachment-info" style="display:none;">
        <span id="attachmentLabel"></span>
      </div>

      <button type="submit" id="sendBtn">Envoyer</button>
    </form>

    <div id="status" class="status" style="display:none;"></div>

    <!-- ====== SCAN NO-RÉPONSE ====== -->
    <div style="margin-top:32px;border-top:1px solid #222;padding-top:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div>
          <h2 style="margin:0;font-size:16px;font-weight:600;color:#e0e0e0;">Scan no-réponse</h2>
          <p style="margin:4px 0 0;font-size:12px;color:#555;">Trouve les contacts qui n'ont pas répondu dans les 7 derniers jours et relance-les en un clic.</p>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div class="field" style="margin:0;">
          <label style="font-size:12px;color:#666;">Template à scanner</label>
          <select id="scanTemplate">
            <option value="">Choisir un template...</option>
          </select>
        </div>
        <div class="field" style="margin:0;">
          <label style="font-size:12px;color:#666;">Template de relance</label>
          <select id="relanceTemplate">
            <option value="">Choisir un template...</option>
          </select>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <button id="scanBtn" type="button" style="background:#1a1a1a;border:1px solid #333;color:#e0e0e0;width:auto;padding:10px 24px;font-size:13px;border-radius:8px;cursor:pointer;">
          🔍 Lancer le scan
        </button>
        <span style="font-size:13px;color:#555;">sur les</span>
        <input type="number" id="scanDays" value="7" min="0" max="90" style="width:60px;text-align:center;padding:8px;font-size:13px;">
        <span style="font-size:13px;color:#555;">derniers jours <span style="color:#444;">(0 = aujourd'hui)</span></span>
      </div>

      <div id="scanStatus" style="display:none;font-size:13px;color:#666;margin-bottom:12px;"></div>

      <div id="scanResults" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span id="scanResultsCount" style="font-size:13px;color:#aaa;"></span>
          <div style="display:flex;gap:8px;align-items:center;">
            <label style="font-size:12px;color:#555;cursor:pointer;">
              <input type="checkbox" id="selectAll" style="width:auto;margin-right:4px;"> Tout sélectionner
            </label>
            <button id="relanceBtn" type="button" style="background:#4a9eff;border:none;color:#fff;width:auto;padding:8px 20px;font-size:13px;border-radius:8px;cursor:pointer;">
              Relancer la sélection
            </button>
          </div>
        </div>
        <div id="scanList" style="display:flex;flex-direction:column;gap:6px;"></div>
        <div id="relanceStatus" style="display:none;margin-top:12px;font-size:13px;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
