<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMailSender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div>
        <h1>GMailSender</h1>
        <p class="subtitle">Envoi rapide d'emails post cold-call</p>
      </div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:4px;">
        <span id="userEmail" style="color:#666;font-size:13px;"></span>
        <a href="/stats.html" style="color:#4a9eff;text-decoration:none;font-size:13px;">Stats</a>
        <a href="/config.html" style="color:#4a9eff;text-decoration:none;font-size:13px;">Config</a>
        <a id="adminLink" href="/admin.html" style="color:#818cf8;text-decoration:none;font-size:13px;display:none;">Admin</a>
        <button onclick="logout()" style="background:none;border:1px solid #333;color:#999;width:auto;padding:4px 10px;font-size:12px;border-radius:6px;cursor:pointer;">Déco</button>
      </div>
    </div>

    <form id="emailForm">
      <div class="field">
        <label for="template">Template</label>
        <select id="template" required>
          <option value="">Choisir un template...</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="prenom">Prénom du contact</label>
          <input type="text" id="prenom" placeholder="Jean-Pierre" required>
        </div>
        <div class="field">
          <label for="email">Email du contact</label>
          <input type="email" id="email" placeholder="contact@exemple.com" required>
        </div>
      </div>

      <div id="dateRdvField" class="field" style="display:none;">
        <label for="dateRdv">Date et heure du RDV</label>
        <input type="text" id="dateRdv" placeholder="mercredi 08/04 à 15h45">
      </div>

      <div id="attachmentInfo" class="attachment-info" style="display:none;">
        <span id="attachmentLabel"></span>
      </div>

      <button type="submit" id="sendBtn">Envoyer</button>
    </form>

    <div id="status" class="status" style="display:none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
