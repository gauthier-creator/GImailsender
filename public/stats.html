<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistiques — GMailSender</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .value {
      font-size: 36px;
      font-weight: 700;
      color: #4a9eff;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card .label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .section {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
      margin: 0 0 20px 0;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .bar-label {
      font-size: 13px;
      color: #bbb;
      width: 220px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1;
      background: #222;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #4a9eff;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .bar-count {
      font-size: 13px;
      color: #666;
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }
    .chart-area {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
      padding-bottom: 20px;
      position: relative;
    }
    .chart-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      position: relative;
    }
    .chart-bar {
      width: 100%;
      background: #4a9eff;
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: height 0.4s ease;
    }
    .chart-bar:hover { background: #6ab0ff; }
    .chart-day {
      font-size: 9px;
      color: #444;
      position: absolute;
      bottom: -18px;
      white-space: nowrap;
    }
    .recent-table {
      width: 100%;
      border-collapse: collapse;
    }
    .recent-table th {
      text-align: left;
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 12px 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .recent-table td {
      padding: 10px 12px 10px 0;
      font-size: 13px;
      color: #bbb;
      border-bottom: 1px solid #1e1e1e;
    }
    .recent-table tr:last-child td { border-bottom: none; }
    .tag {
      display: inline-block;
      background: #1e3a5f;
      color: #4a9eff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 24px 0; }
    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .bar-label { width: 140px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div>
        <h1>Statistiques</h1>
        <p class="subtitle">Suivi des emails envoyés</p>
      </div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:4px;">
        <span id="userEmail" style="color:#666;font-size:13px;"></span>
        <a href="/" style="color:#4a9eff;text-decoration:none;font-size:13px;">Envoi</a>
        <a href="/config.html" style="color:#4a9eff;text-decoration:none;font-size:13px;">Config</a>
        <a id="adminLink" href="/admin.html" style="color:#818cf8;text-decoration:none;font-size:13px;display:none;">Admin</a>
        <button onclick="logout()" style="background:none;border:1px solid #333;color:#999;width:auto;padding:4px 10px;font-size:12px;border-radius:6px;cursor:pointer;">Déco</button>
      </div>
    </div>

    <div id="loading" style="color:#555;font-size:13px;padding:40px 0;">Chargement...</div>
    <div id="content" style="display:none;">
      <!-- KPIs -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="value" id="kpiTotal">0</div>
          <div class="label">Total envoyés</div>
        </div>
        <div class="stat-card">
          <div class="value" id="kpiToday">0</div>
          <div class="label">Aujourd'hui</div>
        </div>
        <div class="stat-card">
          <div class="value" id="kpiWeek">0</div>
          <div class="label">Cette semaine</div>
        </div>
        <div class="stat-card">
          <div class="value" id="kpiMonth">0</div>
          <div class="label">Ce mois</div>
        </div>
      </div>

      <!-- Graphique 30j -->
      <div class="section">
        <h2>Envois — 30 derniers jours</h2>
        <div class="chart-area" id="chartArea"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;" id="bottomGrid">
        <!-- Par template -->
        <div class="section">
          <h2>Par template</h2>
          <div id="byTemplate"></div>
        </div>
        <!-- Par utilisateur (admin seulement) -->
        <div class="section" id="byUserSection" style="display:none;">
          <h2>Par commercial</h2>
          <div id="byUser"></div>
        </div>
      </div>

      <!-- Derniers envois -->
      <div class="section">
        <h2>Derniers envois</h2>
        <div id="recentTable"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script src="stats.js"></script>
</body>
</html>
